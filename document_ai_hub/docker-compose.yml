services:
  postgres:
    image: postgres:15
    container_name: document_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  chromadb:
    image: chromadb/chroma
    container_name: document_ai_hub_chroma
    restart: always
    volumes:
      - chroma_data:/chroma
    ports:
      - "8001:8000"

  backend:
    build: ./document_ai_hu/
    container_name: document_ai_hub_backend
    restart: always
    depends_on:
      - postgres
      - chromadb
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    ports:
      - "8000:8000"

  frontend:
    build: ./document_ai_hub/frontend
    container_name: document_ai_hub_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  chroma_data:
